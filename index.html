<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineRoll — Cosa guardo stasera?</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --border: #2a2a38;
    --text: #e8e8f0;
    --muted: #6b6b88;
    --accent: #e8b84b;
    --accent2: #c0392b;
    --netflix: #e50914;
    --prime: #00a8e1;
    --paramount: #0064ff;
    --apple: #f5f5f7;
    --disney: #113ccf;
    --mubi: #000000;
    --now: #00b3ff;
    --radius: 10px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.5;
  }

  /* Ambient glow */
  .glow-top {
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(232,184,75,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 820px;
    margin: 0 auto;
    padding: 0 24px 80px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    text-align: center;
    padding: 60px 0 48px;
  }

  .logo-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 10px;
  }

  .film-strip {
    display: flex;
    gap: 4px;
  }

  .film-hole {
    width: 8px;
    height: 8px;
    border-radius: 2px;
    background: var(--accent);
    opacity: 0.6;
  }

  .dice {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 30px;
    height: 30px;
    border-radius: 7px;
    border: 1.5px solid rgba(232,184,75,0.35);
    background: rgba(232,184,75,0.06);
    color: var(--accent);
    font-size: 1.1rem;
    opacity: 0.8;
    animation: diceFloat 4s ease-in-out infinite;
    flex-shrink: 0;
  }

  .dice.delay { animation-delay: -2s; }

  @keyframes diceFloat {
    0%, 100% { transform: translateY(0) rotate(-5deg); opacity: 0.7; }
    50%       { transform: translateY(-5px) rotate(5deg); opacity: 1; }
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.2rem, 5vw, 3.2rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #e8e8f0 30%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .tagline {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    color: var(--muted);
    font-size: 1rem;
    margin-top: 6px;
  }



  /* Streaming filters */
  .platforms {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-bottom: 32px;
  }

  .platform-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    border-radius: 50px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    transition: all 0.2s ease;
    user-select: none;
  }

  .platform-toggle:hover { border-color: var(--muted); }

  .platform-toggle.active { background: var(--surface2); }
  .platform-toggle.active.netflix { border-color: var(--netflix); box-shadow: 0 0 12px rgba(229,9,20,0.2); }
  .platform-toggle.active.prime { border-color: var(--prime); box-shadow: 0 0 12px rgba(0,168,225,0.2); }
  .platform-toggle.active.paramount { border-color: var(--paramount); box-shadow: 0 0 12px rgba(0,100,255,0.2); }
  .platform-toggle.active.apple { border-color: rgba(245,245,247,0.6); box-shadow: 0 0 12px rgba(245,245,247,0.1); }
  .platform-toggle.active.disney { border-color: var(--disney); box-shadow: 0 0 12px rgba(17,60,207,0.25); }
  .platform-toggle.active.mubi { border-color: rgba(255,255,255,0.4); box-shadow: 0 0 12px rgba(255,255,255,0.08); }
  .platform-toggle.active.now { border-color: var(--now); box-shadow: 0 0 12px rgba(0,179,255,0.2); }

  .platform-toggle input[type="checkbox"] { display: none; }

  .platform-icon {
    width: 22px;
    height: 22px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.7rem;
    color: white;
    flex-shrink: 0;
  }
  .netflix .platform-icon { background: var(--netflix); }
  .prime .platform-icon { background: var(--prime); }
  .paramount .platform-icon { background: var(--paramount); }
  .apple .platform-icon { background: #1c1c1e; border: 1px solid rgba(255,255,255,0.15); }

  .platform-name {
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text);
  }

  .check-icon {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-left: 4px;
    transition: all 0.2s;
    font-size: 0.6rem;
    color: transparent;
  }
  .platform-toggle.active .check-icon {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
  }

  /* Search */
  .search-wrap {
    position: relative;
    margin-bottom: 8px;
  }

  .search-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 1rem;
    pointer-events: none;
  }

  #searchInput {
    width: 100%;
    padding: 16px 16px 16px 46px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  #searchInput:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(232,184,75,0.08);
  }

  #searchInput::placeholder { color: var(--muted); }

  .search-hint {
    font-size: 0.75rem;
    color: var(--muted);
    text-align: right;
    margin-bottom: 20px;
    min-height: 18px;
  }

  /* Dropdown results */
  #dropdown {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-top: -12px;
    margin-bottom: 24px;
    display: none;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
  }

  #dropdown.visible { display: block; }

  .dropdown-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    cursor: pointer;
    transition: background 0.15s;
    border-bottom: 1px solid var(--border);
  }

  .dropdown-item:last-child { border-bottom: none; }
  .dropdown-item:hover { background: var(--surface2); }

  .movie-poster-thumb {
    width: 36px;
    height: 54px;
    border-radius: 4px;
    object-fit: cover;
    background: var(--surface2);
    flex-shrink: 0;
  }

  .movie-poster-placeholder {
    width: 36px;
    height: 54px;
    border-radius: 4px;
    background: var(--surface2);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 1.2rem;
  }

  .item-info { flex: 1; min-width: 0; }
  .item-title { font-size: 0.92rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-year { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

  .item-platforms {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }

  .platform-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .add-btn-small {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--accent);
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .add-btn-small:hover { background: var(--accent); color: #000; border-color: var(--accent); }

  .dropdown-empty {
    padding: 20px;
    text-align: center;
    color: var(--muted);
    font-size: 0.88rem;
    font-style: italic;
  }

  /* Watchlist */
  .section-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  #watchlist {
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-height: 40px;
  }

  .watchlist-item {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    animation: slideIn 0.25s ease;
    transition: border-color 0.2s;
  }

  .watchlist-item:hover { border-color: var(--muted); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .wl-poster {
    width: 44px;
    height: 66px;
    border-radius: 6px;
    object-fit: cover;
    background: var(--surface2);
    flex-shrink: 0;
  }

  .wl-poster-placeholder {
    width: 44px;
    height: 66px;
    border-radius: 6px;
    background: var(--surface2);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
  }

  .wl-info { flex: 1; min-width: 0; }
  .wl-title {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 400;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .wl-meta {
    font-size: 0.75rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .wl-platforms {
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .platform-badge {
    font-size: 0.65rem;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 4px;
    letter-spacing: 0.04em;
  }
  .badge-netflix { background: rgba(229,9,20,0.15); color: #ff6b6b; border: 1px solid rgba(229,9,20,0.3); }
  .badge-prime { background: rgba(0,168,225,0.15); color: #5bc9f0; border: 1px solid rgba(0,168,225,0.3); }
  .badge-paramount { background: rgba(0,100,255,0.15); color: #6b9fff; border: 1px solid rgba(0,100,255,0.3); }
  .badge-apple { background: rgba(245,245,247,0.08); color: #e0e0e0; border: 1px solid rgba(245,245,247,0.15); }
  .badge-disney { background: rgba(17,60,207,0.15); color: #7b9fff; border: 1px solid rgba(17,60,207,0.3); }
  .badge-mubi { background: rgba(255,255,255,0.06); color: #cccccc; border: 1px solid rgba(255,255,255,0.15); }
  .badge-now { background: rgba(0,179,255,0.12); color: #5dd4f5; border: 1px solid rgba(0,179,255,0.3); }

  .remove-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .remove-btn:hover { border-color: var(--accent2); color: var(--accent2); background: rgba(192,57,43,0.08); }

  /* Random button */
  .random-section {
    text-align: center;
    margin-top: 28px;
  }

  #randomBtn {
    background: linear-gradient(135deg, var(--accent), #d4a017);
    color: #0a0a0f;
    border: none;
    border-radius: 50px;
    padding: 14px 36px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.2s ease;
    box-shadow: 0 4px 20px rgba(232,184,75,0.25);
  }

  #randomBtn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(232,184,75,0.35);
  }

  #randomBtn:active { transform: translateY(0); }
  #randomBtn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Result modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(6px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .modal-overlay.visible {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    max-width: 420px;
    width: 100%;
    text-align: center;
    transform: scale(0.9);
    transition: transform 0.3s;
  }

  .modal-overlay.visible .modal { transform: scale(1); }

  .modal-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--accent);
    margin-bottom: 12px;
  }

  .modal-poster {
    width: 120px;
    height: 180px;
    border-radius: 10px;
    object-fit: cover;
    margin: 0 auto 18px;
    display: block;
    box-shadow: 0 12px 40px rgba(0,0,0,0.6);
  }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    margin-bottom: 8px;
  }

  .modal-meta {
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 16px;
  }

  .modal-platforms {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .modal-close {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 24px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .modal-close:hover { border-color: var(--accent); color: var(--accent); }

  .empty-state {
    text-align: center;
    padding: 32px;
    color: var(--muted);
    font-style: italic;
    font-size: 0.9rem;
    border: 1px dashed var(--border);
    border-radius: var(--radius);
  }

  .loading-dots {
    display: inline-flex;
    gap: 4px;
  }

  .loading-dots span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted);
    animation: blink 1.2s infinite;
  }

  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 1; }
  }
</style>
</head>
<body>

<div class="glow-top"></div>

<div class="container">

  <header>
    <div class="logo-line">
      <div class="dice">⚄</div>
      <div class="film-strip"><div class="film-hole"></div><div class="film-hole"></div><div class="film-hole"></div></div>
      <h1>CineRoll</h1>
      <div class="film-strip"><div class="film-hole"></div><div class="film-hole"></div><div class="film-hole"></div></div>
      <div class="dice delay">⚂</div>
    </div>
    <p class="tagline">cosa guardo stasera?</p>
  </header>



  <!-- Platform filters -->
  <p style="text-align:center; font-size:0.78rem; color:var(--muted); letter-spacing:0.06em; text-transform:uppercase; margin-bottom:14px;">A quali servizi di streaming sei abbonato?</p>
  <div class="platforms">
    <label class="platform-toggle netflix active" data-platform="8" data-name="netflix">
      <input type="checkbox" checked>
      <div class="platform-icon" style="background:#e50914;padding:2px;"><img src="https://image.tmdb.org/t/p/original/t2yyOv40HZeVlLjYsCsPHnWLk4W.jpg" style="width:100%;height:100%;object-fit:contain;border-radius:3px;" alt="Netflix"></div>
      <span class="platform-name">Netflix</span>
      <div class="check-icon">✓</div>
    </label>
    <label class="platform-toggle prime active" data-platform="119" data-name="prime">
      <input type="checkbox" checked>
      <div class="platform-icon" style="background:#00a8e1;">P</div>
      <span class="platform-name">Prime Video</span>
      <div class="check-icon">✓</div>
    </label>
    <label class="platform-toggle paramount active" data-platform="531" data-name="paramount">
      <input type="checkbox" checked>
      <div class="platform-icon" style="background:#0064ff;padding:2px;"><img src="https://image.tmdb.org/t/p/original/h5DcR0J2EESLitnhR8xLG1QymTE.jpg" style="width:100%;height:100%;object-fit:contain;border-radius:3px;" alt="Paramount+"></div>
      <span class="platform-name">Paramount+</span>
      <div class="check-icon">✓</div>
    </label>
    <label class="platform-toggle apple active" data-platform="350" data-name="apple">
      <input type="checkbox" checked>
      <div class="platform-icon" style="background:#1c1c1e;padding:2px;border:1px solid rgba(255,255,255,0.15);"><img src="https://image.tmdb.org/t/p/original/6uhKBfmtzFqOcLousHwZuzcrScK.jpg" style="width:100%;height:100%;object-fit:contain;border-radius:3px;" alt="Apple TV+"></div>
      <span class="platform-name">Apple TV+</span>
      <div class="check-icon">✓</div>
    </label>
    <label class="platform-toggle disney active" data-platform="337" data-name="disney">
      <input type="checkbox" checked>
      <div class="platform-icon" style="background:#113ccf; padding:2px;"><img src="https://image.tmdb.org/t/p/original/97yvRBw1GzX7fXprcF80er19ot.jpg" style="width:100%;height:100%;object-fit:contain;border-radius:3px;" alt="Disney+"></div>
      <span class="platform-name">Disney+</span>
      <div class="check-icon">✓</div>
    </label>
    <label class="platform-toggle mubi active" data-platform="190" data-name="mubi">
      <input type="checkbox" checked>
      <div class="platform-icon" style="background:#000; padding:2px;"><img src="https://image.tmdb.org/t/p/original/fj9Y8iIMFUC6952HwxbGixTQPb7.jpg" style="width:100%;height:100%;object-fit:contain;border-radius:3px;" alt="MUBI"></div>
      <span class="platform-name">MUBI</span>
      <div class="check-icon">✓</div>
    </label>
    <label class="platform-toggle now active" data-platform="39" data-name="now">
      <input type="checkbox" checked>
      <div class="platform-icon" style="background:#00b3ff; padding:2px;"><img src="https://image.tmdb.org/t/p/original/peURlLlr8jggOwK53fJ5wdQl05y.jpg" style="width:100%;height:100%;object-fit:contain;border-radius:3px;" alt="NOW"></div>
      <span class="platform-name">NOW</span>
      <div class="check-icon">✓</div>
    </label>
  </div>

  <!-- Search -->
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Cerca un film..." autocomplete="off" />
  </div>
  <div class="search-hint" id="searchHint"></div>

  <!-- Dropdown -->
  <div id="dropdown"></div>

  <!-- Watchlist -->
  <div class="section-label">Lista di stasera</div>
  <div id="watchlist">
    <div class="empty-state">La tua lista è vuota. Cerca e aggiungi dei film!</div>
  </div>

  <!-- Random pick -->
  <div class="random-section">
    <button id="randomBtn" disabled>⚄ CineRoll!</button>
  </div>

</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-label">✨ Stasera guardi</div>
    <img class="modal-poster" id="modalPoster" src="" alt="">
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-meta" id="modalMeta"></div>
    <div class="modal-platforms" id="modalPlatforms"></div>
    <button class="modal-close" id="modalClose">Chiudi</button>
  </div>
</div>

<script>
const PLATFORM_IDS = { 8: 'netflix', 119: 'prime', 531: 'paramount', 350: 'apple', 337: 'disney', 190: 'mubi', 39: 'now' };
const PLATFORM_LABELS = { 8: 'Netflix', 119: 'Prime Video', 531: 'Paramount+', 350: 'Apple TV+', 337: 'Disney+', 190: 'MUBI', 39: 'NOW' };
const BADGE_CLASSES = { 8: 'badge-netflix', 119: 'badge-prime', 531: 'badge-paramount', 350: 'badge-apple', 337: 'badge-disney', 190: 'badge-mubi', 39: 'badge-now' };
const DOT_COLORS = { 8: '#e50914', 119: '#00a8e1', 531: '#0064ff', 350: '#f5f5f7', 337: '#113ccf', 190: '#000000', 39: '#00b3ff' };

const backendUrl = 'https://cineroll-backend.onrender.com';
let watchlist = [];
let activePlatforms = new Set([8, 119, 531, 350, 337, 190, 39]);
let searchTimeout = null;
let currentResults = [];

// --- Platform toggles ---
document.querySelectorAll('.platform-toggle').forEach(toggle => {
  toggle.addEventListener('click', () => {
    const cb = toggle.querySelector('input[type="checkbox"]');
    cb.checked = !cb.checked;
    const pid = parseInt(toggle.dataset.platform);
    if (cb.checked) {
      toggle.classList.add('active');
      activePlatforms.add(pid);
    } else {
      toggle.classList.remove('active');
      activePlatforms.delete(pid);
    }
    triggerSearch();
  });
});

// --- Search ---
const searchInput = document.getElementById('searchInput');
const dropdown = document.getElementById('dropdown');
const searchHint = document.getElementById('searchHint');

searchInput.addEventListener('input', () => {
  clearTimeout(searchTimeout);
  const q = searchInput.value.trim();
  if (q.length < 2) {
    dropdown.classList.remove('visible');
    searchHint.textContent = '';
    return;
  }
  searchHint.innerHTML = '<span class="loading-dots"><span></span><span></span><span></span></span>';
  searchTimeout = setTimeout(() => doSearch(q), 350);
});

document.addEventListener('click', (e) => {
  if (!searchInput.contains(e.target) && !dropdown.contains(e.target)) {
    dropdown.classList.remove('visible');
  }
});

function triggerSearch() {
  const q = searchInput.value.trim();
  if (q.length >= 2) doSearch(q);
}

async function doSearch(query) {


  try {
    const url = `${backendUrl}/api/search?query=${encodeURIComponent(query)}&language=it-IT&region=IT`;
    const res = await fetch(url);
    const data = await res.json();
    let results = data.results || [];

    if (activePlatforms.size > 0) {
      // Fetch providers for top results and filter
      const withProviders = await Promise.all(
        results.slice(0, 15).map(m => fetchProviders(m))
      );
      results = withProviders.filter(m => m._platforms && m._platforms.length > 0);
    } else {
      results = results.slice(0, 10).map(m => ({ ...m, _platforms: [] }));
    }

    currentResults = results;
    renderDropdown(results);
    searchHint.textContent = results.length > 0 ? `${results.length} risultati` : '';
  } catch (err) {
    searchHint.textContent = 'Errore nella ricerca.';
    dropdown.classList.remove('visible');
  }
}

async function fetchProviders(movie) {
  try {
    const res = await fetch(`${backendUrl}/api/providers/${movie.id}`);
    const data = await res.json();
    const itProviders = data.results?.IT;
    const flatrate = itProviders?.flatrate || [];
    const matchedPlatforms = flatrate
      .map(p => p.provider_id)
      .filter(id => activePlatforms.size === 0 || activePlatforms.has(id))
      .filter(id => PLATFORM_IDS[id]);
    return { ...movie, _platforms: matchedPlatforms };
  } catch {
    return { ...movie, _platforms: [] };
  }
}

async function fetchAllProviders(movie) {
  try {
    const res = await fetch(`${backendUrl}/api/providers/${movie.id}`);
    const data = await res.json();
    const itProviders = data.results?.IT;
    const flatrate = itProviders?.flatrate || [];
    const matched = flatrate.map(p => p.provider_id).filter(id => PLATFORM_IDS[id]);
    return { ...movie, _platforms: matched };
  } catch {
    return { ...movie, _platforms: [] };
  }
}

function renderDropdown(results) {
  if (results.length === 0) {
    dropdown.innerHTML = '<div class="dropdown-empty">Nessun film trovato con i filtri selezionati</div>';
    dropdown.classList.add('visible');
    return;
  }

  dropdown.innerHTML = results.map(m => {
    const poster = m.poster_path
      ? `<img class="movie-poster-thumb" src="https://image.tmdb.org/t/p/w92${m.poster_path}" alt="">`
      : `<div class="movie-poster-placeholder">🎬</div>`;
    const year = m.release_date ? m.release_date.slice(0, 4) : '—';
    const dots = (m._platforms || []).map(pid =>
      `<div class="platform-dot" style="background:${DOT_COLORS[pid]}" title="${PLATFORM_LABELS[pid]}"></div>`
    ).join('');

    return `<div class="dropdown-item" data-id="${m.id}">
      ${poster}
      <div class="item-info">
        <div class="item-title">${m.title}</div>
        <div class="item-year">${year}</div>
      </div>
      <div class="item-platforms">${dots}</div>
      <button class="add-btn-small" title="Aggiungi">+</button>
    </div>`;
  }).join('');

  dropdown.querySelectorAll('.dropdown-item').forEach((el, i) => {
    el.querySelector('.add-btn-small').addEventListener('click', (e) => {
      e.stopPropagation();
      addToWatchlist(results[i]);
    });
    el.addEventListener('click', () => addToWatchlist(results[i]));
  });

  dropdown.classList.add('visible');
}

// --- Watchlist ---
async function addToWatchlist(movie) {
  if (watchlist.find(m => m.id === movie.id)) return;
  // Fetch all providers if not already done
  let m = movie;
  if (!m._platforms || m._platforms.length === 0 && activePlatforms.size === 0) {
    m = await fetchAllProviders(movie);
  }
  watchlist.push(m);
  renderWatchlist();
  dropdown.classList.remove('visible');
  searchInput.value = '';
  searchHint.textContent = '';
}

function removeFromWatchlist(id) {
  watchlist = watchlist.filter(m => m.id !== id);
  renderWatchlist();
}

function renderWatchlist() {
  const container = document.getElementById('watchlist');
  const btn = document.getElementById('randomBtn');

  if (watchlist.length === 0) {
    container.innerHTML = '<div class="empty-state">La tua lista è vuota. Cerca e aggiungi dei film!</div>';
    btn.disabled = true;
    return;
  }

  btn.disabled = false;

  container.innerHTML = watchlist.map(m => {
    const poster = m.poster_path
      ? `<img class="wl-poster" src="https://image.tmdb.org/t/p/w92${m.poster_path}" alt="">`
      : `<div class="wl-poster-placeholder">🎬</div>`;
    const year = m.release_date ? m.release_date.slice(0, 4) : '';
    const rating = m.vote_average ? `⭐ ${m.vote_average.toFixed(1)}` : '';
    const badges = (m._platforms || []).map(pid =>
      `<span class="platform-badge ${BADGE_CLASSES[pid]}">${PLATFORM_LABELS[pid]}</span>`
    ).join('');

    return `<div class="watchlist-item">
      ${poster}
      <div class="wl-info">
        <div class="wl-title">${m.title}</div>
        <div class="wl-meta">
          ${year ? `<span>${year}</span>` : ''}
          ${rating ? `<span>${rating}</span>` : ''}
          <div class="wl-platforms">${badges}</div>
        </div>
      </div>
      <button class="remove-btn" data-id="${m.id}" title="Rimuovi">✕</button>
    </div>`;
  }).join('');

  container.querySelectorAll('.remove-btn').forEach(btn => {
    btn.addEventListener('click', () => removeFromWatchlist(parseInt(btn.dataset.id)));
  });
}

// --- Random pick ---
document.getElementById('randomBtn').addEventListener('click', () => {
  if (watchlist.length === 0) return;
  const pick = watchlist[Math.floor(Math.random() * watchlist.length)];
  showModal(pick);
});

function showModal(movie) {
  document.getElementById('modalTitle').textContent = movie.title;
  const year = movie.release_date ? movie.release_date.slice(0, 4) : '';
  const rating = movie.vote_average ? `⭐ ${movie.vote_average.toFixed(1)}` : '';
  document.getElementById('modalMeta').textContent = [year, rating].filter(Boolean).join(' · ');

  const poster = document.getElementById('modalPoster');
  if (movie.poster_path) {
    poster.src = `https://image.tmdb.org/t/p/w342${movie.poster_path}`;
    poster.style.display = 'block';
  } else {
    poster.style.display = 'none';
  }

  const platforms = document.getElementById('modalPlatforms');
  platforms.innerHTML = (movie._platforms || []).map(pid =>
    `<span class="platform-badge ${BADGE_CLASSES[pid]}">${PLATFORM_LABELS[pid]}</span>`
  ).join('');

  document.getElementById('modalOverlay').classList.add('visible');
}

document.getElementById('modalClose').addEventListener('click', () => {
  document.getElementById('modalOverlay').classList.remove('visible');
});

document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('visible');
  }
});
</script>
</body>
</html>
